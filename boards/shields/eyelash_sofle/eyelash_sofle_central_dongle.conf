#EXT POWER
CONFIG_ZMK_EXT_POWER=y

# 3 profiles (n+2)
CONFIG_BT_MAX_CONN=6
CONFIG_BT_MAX_PAIRED=6

# dongle mode
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# display
CONFIG_ZMK_DISPLAY=y
CONFIG_BT_BAS=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Enable SPI
CONFIG_SPI=y

# RGB underglow behavior must be compiled on central so the behavior device
# exists when processing the keymap; without this, rgb_ug bindings are
# transparent (return 1) causing fall-through to the base layer (printing zxcvb).
# Do NOT add EXT_POWER, ON_START, or any hardware-specific options here —
# the dongle has no physical LED strip; those configs belong on the peripherals.
CONFIG_ZMK_RGB_UNDERGLOW=y
